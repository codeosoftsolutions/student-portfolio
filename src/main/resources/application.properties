spring.application.name=student-portfolio1

# ===================================================
# APPLICATION NAME
# ===================================================

# ===================================================
# SERVER PORT
# Your app will run at: http://localhost:8080
# ===================================================
server.port=8080

# ===================================================
# MYSQL DATABASE CONNECTION
# Change username and password to yours
# First create a database named: student_portfolio_db
# ===================================================
spring.datasource.url=jdbc:mysql://localhost:3306/student_portfolio_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Rogue@100M
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===================================================
# JPA / HIBERNATE SETTINGS
# update = auto creates/updates tables from your models
# ===================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ===================================================
# FILE UPLOAD SETTINGS
# Max profile photo size = 5MB
# Max resume PDF size = 10MB
# ===================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

# ===================================================
# FILE STORAGE PATH
# Uploaded files will be saved in this folder
# ===================================================
app.upload.dir=uploads

# ===================================================
# JWT SECRET KEY
# Change this to any long random string (keep it secret!)
# ===================================================
app.jwt.secret=studenttap_super_secret_key_change_this_in_production_2024
app.jwt.expiration=86400000
# 86400000 milliseconds = 24 hours (token valid for 1 day)

# ===================================================
# EMAIL SETTINGS (for contact form notifications)
# Using Gmail SMTP
# Replace with your Gmail and App Password
# ===================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your_gmail@gmail.com
spring.mail.password=your_gmail_app_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ===================================================
# LOGGING
# ===================================================
logging.level.com.studenttap=DEBUG
logging.level.org.springframework.security=DEBUG

#app.jwt.secret=studenttap_super_secret_key_change_this_in_production_2024
#app.jwt.expiration=86400000

#app.base-url=http://localhost:8080
app.base-url=http://192.168.1.19:8080


