
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Register — StudentTap</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Sora',sans-serif;background:linear-gradient(135deg,#1a1a2e,#312e81);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.page-wrap{display:flex;gap:20px;width:100%;max-width:1100px;align-items:flex-start;justify-content:center;}

/* ===== AD SPACE RIGHT SIDE ===== */
.ad-space{width:200px;flex-shrink:0;display:flex;flex-direction:column;gap:12px;}
.ad-box{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:12px;text-align:center;min-height:150px;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.ad-label{font-size:9px;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}
.ad-content{font-size:11px;color:rgba(255,255,255,0.5);}
@media(max-width:768px){.ad-space{display:none;}}

/* ===== MAIN CARD ===== */
.card{background:white;border-radius:20px;padding:36px 32px;width:100%;max-width:480px;box-shadow:0 20px 60px rgba(0,0,0,0.3);}
.logo{text-align:center;margin-bottom:24px;}
.logo-icon{width:56px;height:56px;background:linear-gradient(135deg,#6366f1,#818cf8);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 10px;}
.logo-text{font-size:22px;font-weight:700;color:#1e293b;}
.logo-sub{font-size:12px;color:#64748b;margin-top:3px;}

/* ===== TYPE SELECTOR ===== */
.type-label{font-size:13px;font-weight:600;color:#374151;margin-bottom:10px;text-align:center;}
.type-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px;}
.type-btn{padding:12px 8px;border:2px solid #e2e8f0;border-radius:12px;background:white;cursor:pointer;text-align:center;transition:all 0.2s;font-family:'Sora',sans-serif;}
.type-btn:hover{border-color:#6366f1;background:#f8f7ff;}
.type-btn.active{border-color:#6366f1;background:linear-gradient(135deg,#6366f1,#818cf8);color:white;}
.type-icon{font-size:22px;display:block;margin-bottom:4px;}
.type-name{font-size:11px;font-weight:600;}
.type-desc{font-size:9px;opacity:0.7;margin-top:1px;}

/* ===== FORM ===== */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.form-group{margin-bottom:12px;}
.form-label{font-size:12px;font-weight:600;color:#374151;margin-bottom:5px;display:block;}
.form-input{width:100%;padding:10px 12px;border:1.5px solid #e2e8f0;border-radius:10px;font-family:'Sora',sans-serif;font-size:13px;color:#1e293b;outline:none;transition:border-color 0.2s;}
.form-input:focus{border-color:#6366f1;}
.form-select{width:100%;padding:10px 12px;border:1.5px solid #e2e8f0;border-radius:10px;font-family:'Sora',sans-serif;font-size:13px;color:#1e293b;outline:none;background:white;}

/* Fresher/Experienced for students */
.student-type-wrap{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.student-type-btn{padding:10px;border:2px solid #e2e8f0;border-radius:10px;cursor:pointer;text-align:center;font-family:'Sora',sans-serif;font-size:12px;font-weight:600;background:white;transition:all 0.2s;}
.student-type-btn.active{border-color:#6366f1;background:#eef2ff;color:#4338ca;}

.email-note{font-size:11px;color:#dc2626;margin-top:4px;display:none;}
.email-note.show{display:block;}

.btn{width:100%;padding:13px;background:linear-gradient(135deg,#6366f1,#818cf8);color:white;border:none;border-radius:10px;font-family:'Sora',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all 0.2s;margin-top:4px;}
.btn:hover{opacity:0.9;transform:translateY(-1px);}
.btn:disabled{opacity:0.6;cursor:not-allowed;transform:none;}

.error-msg{background:#fef2f2;border:1px solid #fecaca;color:#dc2626;padding:10px;border-radius:8px;font-size:12px;margin-bottom:10px;display:none;}
.success-msg{background:#f0fdf4;border:1px solid #86efac;color:#16a34a;padding:10px;border-radius:8px;font-size:12px;margin-bottom:10px;display:none;}

.login-link{text-align:center;margin-top:16px;font-size:13px;color:#64748b;}
.login-link a{color:#6366f1;font-weight:600;text-decoration:none;}

/* Section panels */
.section{display:none;}
.section.active{display:block;}

.divider{height:1px;background:#e2e8f0;margin:12px 0;}
</style>
</head>
<body>
<div class="page-wrap">

  <!-- MAIN REGISTRATION CARD -->
  <div class="card">
    <div class="logo">
      <div class="logo-icon">🎓</div>
      <div class="logo-text">StudentTap</div>
      <div class="logo-sub">Create your account</div>
    </div>

    <!-- ERROR / SUCCESS -->
    <div class="error-msg" id="error-msg"></div>
    <div class="success-msg" id="success-msg"></div>

    <!-- USER TYPE SELECTION -->
    <div class="type-label">I am registering as:</div>
    <div class="type-grid">
      <button class="type-btn active" onclick="selectType('student',this)">
        <span class="type-icon">👨‍🎓</span>
        <div class="type-name">Student</div>
        <div class="type-desc">Job seeker / Fresher</div>
      </button>
      <button class="type-btn" onclick="selectType('hostel',this)">
        <span class="type-icon">🏠</span>
        <div class="type-name">Hostel / PG</div>
        <div class="type-desc">Owner / Manager</div>
      </button>
      <button class="type-btn" onclick="selectType('institute',this)">
        <span class="type-icon">🏫</span>
        <div class="type-name">Institute</div>
        <div class="type-desc">Coaching / Training</div>
      </button>
      <button class="type-btn" onclick="selectType('company',this)">
        <span class="type-icon">🏢</span>
        <div class="type-name">Company</div>
        <div class="type-desc">Official email required</div>
      </button>
    </div>

    <div class="divider"></div>

    <!-- ===== STUDENT SECTION ===== -->
    <div class="section active" id="section-student">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Full Name *</label>
          <input class="form-input" id="s-name" placeholder="Your full name"/>
        </div>
        <div class="form-group">
          <label class="form-label">Username *</label>
          <input class="form-input" id="s-username" placeholder="e.g. saikiran" oninput="checkUsername(this)"/>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Email Address *</label>
        <input class="form-input" id="s-email" type="email" placeholder="your@email.com"/>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Phone Number *</label>
          <input class="form-input" id="s-phone" placeholder="10 digit number"/>
        </div>
        <div class="form-group">
          <label class="form-label">Password *</label>
          <input class="form-input" id="s-password" type="password" placeholder="Min 6 chars"/>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">I am a *</label>
        <div class="student-type-wrap">
          <button class="student-type-btn active" onclick="selectStudentType('FRESHER',this)">
            🎓 Fresher<br><small style="font-weight:400">Student / Recent graduate</small>
          </button>
          <button class="student-type-btn" onclick="selectStudentType('EXPERIENCED',this)">
            💼 Experienced<br><small style="font-weight:400">Working professional</small>
          </button>
        </div>
      </div>
    </div>

    <!-- ===== HOSTEL SECTION ===== -->
    <div class="section" id="section-hostel">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Owner Name *</label>
          <input class="form-input" id="h-name" placeholder="Your full name"/>
        </div>
        <div class="form-group">
          <label class="form-label">Hostel/PG Name *</label>
          <input class="form-input" id="h-hostel-name" placeholder="e.g. Sri Sai PG"/>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Email Address *</label>
        <input class="form-input" id="h-email" type="email" placeholder="your@email.com"/>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Phone Number *</label>
          <input class="form-input" id="h-phone" placeholder="10 digit number"/>
        </div>
        <div class="form-group">
          <label class="form-label">City *</label>
          <input class="form-input" id="h-city" placeholder="e.g. Hyderabad"/>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Password *</label>
        <input class="form-input" id="h-password" type="password" placeholder="Min 6 chars"/>
      </div>
    </div>

    <!-- ===== INSTITUTE SECTION ===== -->
    <div class="section" id="section-institute">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Contact Person *</label>
          <input class="form-input" id="i-name" placeholder="Your full name"/>
        </div>
        <div class="form-group">
          <label class="form-label">Institute Name *</label>
          <input class="form-input" id="i-institute-name" placeholder="e.g. ABC Coaching"/>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Email Address *</label>
        <input class="form-input" id="i-email" type="email" placeholder="your@email.com"/>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Phone Number *</label>
          <input class="form-input" id="i-phone" placeholder="10 digit number"/>
        </div>
        <div class="form-group">
          <label class="form-label">City *</label>
          <input class="form-input" id="i-city" placeholder="e.g. Hyderabad"/>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Password *</label>
        <input class="form-input" id="i-password" type="password" placeholder="Min 6 chars"/>
      </div>
    </div>

    <!-- ===== COMPANY SECTION ===== -->
    <div class="section" id="section-company">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Contact Person *</label>
          <input class="form-input" id="c-name" placeholder="HR / Manager name"/>
        </div>
        <div class="form-group">
          <label class="form-label">Company Name *</label>
          <input class="form-input" id="c-company-name" placeholder="e.g. ABC Pvt Ltd"/>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Official Email *</label>
        <input class="form-input" id="c-email" type="email"
          placeholder="hr@company.com or info@company.com"
          oninput="validateCompanyEmail(this)"/>
        <div class="email-note" id="c-email-note">
          ⚠️ Only official company emails allowed!
          Gmail, Yahoo, Hotmail etc. are not accepted.
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Phone Number *</label>
          <input class="form-input" id="c-phone" placeholder="10 digit number"/>
        </div>
        <div class="form-group">
          <label class="form-label">Industry *</label>
          <select class="form-select" id="c-industry">
            <option value="">Select industry</option>
            <option>Information Technology</option>
            <option>Software Development</option>
            <option>Banking & Finance</option>
            <option>Healthcare</option>
            <option>Education</option>
            <option>Manufacturing</option>
            <option>Retail & E-commerce</option>
            <option>Other</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Password *</label>
        <input class="form-input" id="c-password" type="password" placeholder="Min 6 chars"/>
      </div>
    </div>

    <!-- REGISTER BUTTON -->
    <button class="btn" id="register-btn" onclick="doRegister()">
      🚀 Create Account
    </button>

    <div class="login-link">
      Already have an account? <a href="/login.html">Login here →</a>
    </div>
  </div>

  <!-- AD SPACE RIGHT SIDE -->
  <div class="ad-space">
    <div class="ad-box" id="ad-1">
      <div class="ad-label">Advertisement</div>
      <div class="ad-content">Ad space available</div>
    </div>
    <div class="ad-box" id="ad-2">
      <div class="ad-label">Advertisement</div>
      <div class="ad-content">Ad space available</div>
    </div>
    <div class="ad-box" id="ad-3">
      <div class="ad-label">Advertisement</div>
      <div class="ad-content">Ad space available</div>
    </div>
  </div>

</div>

<script>
const API = window.location.origin;
let currentType = 'student';
let studentType = 'FRESHER';

// Blocked email domains for companies
const BLOCKED_DOMAINS = [
  'gmail.com','yahoo.com','hotmail.com','outlook.com',
  'rediffmail.com','ymail.com','live.com','aol.com',
  'icloud.com','protonmail.com','mail.com'
];

function selectType(type, btn) {
  currentType = type;
  // Update buttons
  document.querySelectorAll('.type-btn')
    .forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  // Show section
  document.querySelectorAll('.section')
    .forEach(s => s.classList.remove('active'));
  document.getElementById('section-' + type)
    .classList.add('active');
}

function selectStudentType(type, btn) {
  studentType = type;
  document.querySelectorAll('.student-type-btn')
    .forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function validateCompanyEmail(input) {
  const email = input.value.toLowerCase();
  const domain = email.split('@')[1] || '';
  const note = document.getElementById('c-email-note');
  if (domain && BLOCKED_DOMAINS.includes(domain)) {
    note.classList.add('show');
    input.style.borderColor = '#dc2626';
  } else {
    note.classList.remove('show');
    input.style.borderColor = '#e2e8f0';
  }
}

function checkUsername(input) {
  // Only allow lowercase letters, numbers, hyphens
  input.value = input.value.toLowerCase()
    .replace(/[^a-z0-9-]/g, '');
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.style.display = 'block';
  document.getElementById('success-msg').style.display = 'none';
  setTimeout(() => el.style.display = 'none', 5000);
}

function showSuccess(msg) {
  const el = document.getElementById('success-msg');
  el.textContent = msg;
  el.style.display = 'block';
  document.getElementById('error-msg').style.display = 'none';
}

async function doRegister() {
  const btn = document.getElementById('register-btn');
  btn.disabled = true;
  btn.textContent = '⏳ Creating account...';

  try {
    let body = {};
    let endpoint = '';

    if (currentType === 'student') {
      const name = document.getElementById('s-name').value.trim();
      const username = document.getElementById('s-username').value.trim();
      const email = document.getElementById('s-email').value.trim();
      const phone = document.getElementById('s-phone').value.trim();
      const password = document.getElementById('s-password').value;
      if (!name||!username||!email||!phone||!password) {
        showError('Please fill all required fields!');
        return;
      }
      if (password.length < 6) {
        showError('Password must be at least 6 characters!');
        return;
      }
      body = {fullName:name, username, email, phone,
        password, isFresher: studentType === 'FRESHER',
        userType: 'STUDENT'};
      endpoint = '/api/auth/register';

    } else if (currentType === 'hostel') {
      const name = document.getElementById('h-name').value.trim();
      const hostelName = document.getElementById('h-hostel-name').value.trim();
      const email = document.getElementById('h-email').value.trim();
      const phone = document.getElementById('h-phone').value.trim();
      const city = document.getElementById('h-city').value.trim();
      const password = document.getElementById('h-password').value;
      if (!name||!hostelName||!email||!phone||!city||!password) {
        showError('Please fill all required fields!');
        return;
      }
      body = {fullName:name, businessName:hostelName,
        email, phone, city, password,
        userType: 'HOSTEL'};
      endpoint = '/api/auth/register-business';

    } else if (currentType === 'institute') {
      const name = document.getElementById('i-name').value.trim();
      const instituteName = document.getElementById('i-institute-name').value.trim();
      const email = document.getElementById('i-email').value.trim();
      const phone = document.getElementById('i-phone').value.trim();
      const city = document.getElementById('i-city').value.trim();
      const password = document.getElementById('i-password').value;
      if (!name||!instituteName||!email||!phone||!city||!password) {
        showError('Please fill all required fields!');
        return;
      }
      body = {fullName:name, businessName:instituteName,
        email, phone, city, password,
        userType: 'INSTITUTE'};
      endpoint = '/api/auth/register-business';

    } else if (currentType === 'company') {
      const name = document.getElementById('c-name').value.trim();
      const companyName = document.getElementById('c-company-name').value.trim();
      const email = document.getElementById('c-email').value.trim();
      const phone = document.getElementById('c-phone').value.trim();
      const industry = document.getElementById('c-industry').value;
      const password = document.getElementById('c-password').value;

      // Validate company email
      const domain = email.split('@')[1]||'';
      if (BLOCKED_DOMAINS.includes(domain.toLowerCase())) {
        showError('Please use your official company email! Gmail/Yahoo not allowed.');
        return;
      }
      if (!name||!companyName||!email||!phone||!industry||!password) {
        showError('Please fill all required fields!');
        return;
      }
      body = {fullName:name, businessName:companyName,
        email, phone, industry, password,
        userType: 'COMPANY'};
      endpoint = '/api/auth/register-business';
    }

    const res = await fetch(API + endpoint, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(body)
    });
    const data = await res.json();

    if (data.success || res.ok) {
      showSuccess('✅ Account created successfully! Redirecting to login...');
      setTimeout(() => {
        window.location.href = '/login.html';
      }, 2000);
    } else {
      showError(data.message || 'Registration failed! Please try again.');
    }

  } catch(e) {
    showError('Cannot connect to server. Please try again.');
  } finally {
    btn.disabled = false;
    btn.textContent = '🚀 Create Account';
  }
}

// Load ads from API
async function loadAds() {
  try {
    const res = await fetch(API + '/api/public/ads');
    if (!res.ok) return;
    const data = await res.json();
    if (data.data && data.data.length > 0) {
      data.data.slice(0, 3).forEach((ad, i) => {
        const box = document.getElementById('ad-' + (i+1));
        if (box && ad.imageUrl) {
          box.innerHTML = `
            <div class="ad-label">Sponsored</div>
            <a href="${ad.linkUrl||'#'}" target="_blank">
              <img src="${ad.imageUrl}"
                style="width:100%;border-radius:6px;"/>
            </a>
            <div style="font-size:10px;color:rgba(255,255,255,0.6);
              margin-top:4px;">${ad.title||''}</div>`;
        }
      });
    }
  } catch(e) {}
}

loadAds();
</script>
</body>
</html>
