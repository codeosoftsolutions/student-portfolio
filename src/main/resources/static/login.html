<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login — StudentTap</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Sora',sans-serif;background:linear-gradient(135deg,#1a1a2e,#312e81);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.page-wrap{display:flex;gap:20px;width:100%;max-width:1100px;align-items:flex-start;justify-content:center;}

/* AD SPACE */
.ad-space{width:200px;flex-shrink:0;display:flex;flex-direction:column;gap:12px;}
.ad-box{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:12px;text-align:center;min-height:150px;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.ad-label{font-size:9px;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}
.ad-content{font-size:11px;color:rgba(255,255,255,0.5);}
@media(max-width:768px){.ad-space{display:none;}}

/* CARD */
.card{background:white;border-radius:20px;padding:36px 32px;width:100%;max-width:440px;box-shadow:0 20px 60px rgba(0,0,0,0.3);}
.logo{text-align:center;margin-bottom:24px;}
.logo-icon{width:56px;height:56px;background:linear-gradient(135deg,#6366f1,#818cf8);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 10px;}
.logo-text{font-size:22px;font-weight:700;color:#1e293b;}
.logo-sub{font-size:12px;color:#64748b;margin-top:3px;}

/* TYPE SELECTOR */
.type-label{font-size:13px;font-weight:600;color:#374151;margin-bottom:10px;text-align:center;}
.type-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px;}
.type-btn{padding:10px 8px;border:2px solid #e2e8f0;border-radius:12px;background:white;cursor:pointer;text-align:center;transition:all 0.2s;font-family:'Sora',sans-serif;}
.type-btn:hover{border-color:#6366f1;background:#f8f7ff;}
.type-btn.active{border-color:#6366f1;background:linear-gradient(135deg,#6366f1,#818cf8);color:white;}
.type-icon{font-size:20px;display:block;margin-bottom:3px;}
.type-name{font-size:11px;font-weight:600;}

.divider{height:1px;background:#e2e8f0;margin:4px 0 16px;}

.form-group{margin-bottom:14px;}
.form-label{font-size:12px;font-weight:600;color:#374151;margin-bottom:5px;display:block;}
.form-input{width:100%;padding:11px 14px;border:1.5px solid #e2e8f0;border-radius:10px;font-family:'Sora',sans-serif;font-size:13px;color:#1e293b;outline:none;transition:border-color 0.2s;}
.form-input:focus{border-color:#6366f1;}

.forgot-link{text-align:right;margin-top:-8px;margin-bottom:12px;}
.forgot-link a{font-size:12px;color:#6366f1;text-decoration:none;}

.btn{width:100%;padding:13px;background:linear-gradient(135deg,#6366f1,#818cf8);color:white;border:none;border-radius:10px;font-family:'Sora',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all 0.2s;}
.btn:hover{opacity:0.9;transform:translateY(-1px);}
.btn:disabled{opacity:0.6;cursor:not-allowed;transform:none;}

.error-msg{background:#fef2f2;border:1px solid #fecaca;color:#dc2626;padding:10px;border-radius:8px;font-size:12px;margin-bottom:12px;display:none;}

.register-link{text-align:center;margin-top:16px;font-size:13px;color:#64748b;}
.register-link a{color:#6366f1;font-weight:600;text-decoration:none;}

/* Company email hint */
.company-hint{background:#eff6ff;border:1px solid #bfdbfe;color:#1d4ed8;padding:8px 12px;border-radius:8px;font-size:11px;margin-bottom:12px;display:none;}
.company-hint.show{display:block;}

/* Admin link - hidden at bottom */
.admin-link{text-align:center;margin-top:20px;padding-top:16px;border-top:1px solid #f1f5f9;}
.admin-link a{font-size:11px;color:#cbd5e1;text-decoration:none;}
.admin-link a:hover{color:#94a3b8;}
</style>
</head>
<body>
<div class="page-wrap">

  <!-- MAIN LOGIN CARD -->
  <div class="card">
    <div class="logo">
      <div class="logo-icon">🎓</div>
      <div class="logo-text">Welcome back 👋</div>
      <div class="logo-sub">Login to manage your account</div>
    </div>

    <div class="error-msg" id="error-msg"></div>

    <!-- USER TYPE SELECTION -->
    <div class="type-label">Login as:</div>
    <div class="type-grid">
      <button class="type-btn active" onclick="selectType('student',this)">
        <span class="type-icon">👨‍🎓</span>
        <div class="type-name">Student</div>
      </button>
      <button class="type-btn" onclick="selectType('hostel',this)">
        <span class="type-icon">🏠</span>
        <div class="type-name">Hostel / PG</div>
      </button>
      <button class="type-btn" onclick="selectType('institute',this)">
        <span class="type-icon">🏫</span>
        <div class="type-name">Institute</div>
      </button>
      <button class="type-btn" onclick="selectType('company',this)">
        <span class="type-icon">🏢</span>
        <div class="type-name">Company</div>
      </button>
    </div>

    <div class="divider"></div>

    <!-- Company hint -->
    <div class="company-hint" id="company-hint">
      🏢 Use your official company email to login
      (e.g. hr@company.com)
    </div>

    <!-- EMAIL / PASSWORD -->
    <div class="form-group">
      <label class="form-label" id="email-label">
        Email Address
      </label>
      <input class="form-input" id="login-email"
        type="email" placeholder="your@email.com"/>
    </div>

    <div class="form-group">
      <label class="form-label">Password</label>
      <input class="form-input" id="login-password"
        type="password" placeholder="Your password"/>
    </div>

    <div class="forgot-link">
      <a href="/forgot-password.html">Forgot password?</a>
    </div>

    <button class="btn" id="login-btn" onclick="doLogin()">
      🚀 Login to Dashboard
    </button>

    <div class="register-link">
      New to StudentTap?
      <a href="/register.html">Create your account →</a>
    </div>

    <!-- HIDDEN ADMIN LINK -->
    <div class="admin-link">
      <a href="/admin-login.html">⚙</a>
    </div>
  </div>

  <!-- AD SPACE RIGHT SIDE -->
  <div class="ad-space">
    <div class="ad-box" id="ad-1">
      <div class="ad-label">Advertisement</div>
      <div class="ad-content">Ad space available</div>
    </div>
    <div class="ad-box" id="ad-2">
      <div class="ad-label">Advertisement</div>
      <div class="ad-content">Ad space available</div>
    </div>
    <div class="ad-box" id="ad-3">
      <div class="ad-label">Advertisement</div>
      <div class="ad-content">Ad space available</div>
    </div>
  </div>

</div>

<script>
const API = window.location.origin;
let currentType = 'student';

// Dashboard redirect per user type
const DASHBOARDS = {
  'STUDENT':   '/student-home.html',
  'HOSTEL':    '/hostel-dashboard.html',
  'INSTITUTE': '/institute-dashboard.html',
  'COMPANY':   '/company-dashboard.html'
};

function selectType(type, btn) {
  currentType = type;
  document.querySelectorAll('.type-btn')
    .forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  // Show company hint
  const hint = document.getElementById('company-hint');
  if (type === 'company') {
    hint.classList.add('show');
  } else {
    hint.classList.remove('show');
  }
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 5000);
}

async function doLogin() {
  const email = document.getElementById('login-email')
    .value.trim();
  const password = document.getElementById('login-password')
    .value;

  if (!email || !password) {
    showError('Please enter email and password!');
    return;
  }

  const btn = document.getElementById('login-btn');
  btn.disabled = true;
  btn.textContent = '⏳ Logging in...';

  try {
    // Determine endpoint based on type
    let endpoint = '/api/auth/login';
    if (currentType !== 'student') {
      endpoint = '/api/auth/login-business';
    }

    const res = await fetch(API + endpoint, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        email, password,
        userType: currentType.toUpperCase()
      })
    });
    const data = await res.json();

    if (res.ok && (data.token || data.success)) {
      // Save token and user info
      localStorage.setItem('token', data.token);
      localStorage.setItem('user',
        JSON.stringify(data.user || {email, userType: currentType.toUpperCase()}));
      localStorage.setItem('userType',
        currentType.toUpperCase());

      // Redirect to correct dashboard
      const userType = (data.user && data.user.userType)
        || currentType.toUpperCase();
      const dashboard = DASHBOARDS[userType]
        || '/student-home.html';

      window.location.href = dashboard;

    } else {
      showError(data.message || 'Invalid email or password!');
    }

  } catch(e) {
    showError('Cannot connect to server. Is the app running?');
  } finally {
    btn.disabled = false;
    btn.textContent = '🚀 Login to Dashboard';
  }
}

// Allow Enter key to login
document.addEventListener('keypress', function(e) {
  if (e.key === 'Enter') doLogin();
});

// Load ads
async function loadAds() {
  try {
    const res = await fetch(API + '/api/public/ads');
    if (!res.ok) return;
    const data = await res.json();
    if (data.data && data.data.length > 0) {
      data.data.slice(0, 3).forEach((ad, i) => {
        const box = document.getElementById('ad-'+(i+1));
        if (box && ad.imageUrl) {
          box.innerHTML = `
            <div class="ad-label">Sponsored</div>
            <a href="${ad.linkUrl||'#'}" target="_blank">
              <img src="${ad.imageUrl}"
                style="width:100%;border-radius:6px;"/>
            </a>`;
        }
      });
    }
  } catch(e) {}
}
loadAds();
</script>
</body>
</html>
