
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Institutes — StudentTap</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--primary:#1a1a2e;--accent:#f97316;--bg:#f8fafc;--card:#fff;--border:#e2e8f0;--text:#1e293b;--muted:#64748b;}
body{font-family:'Sora',sans-serif;background:var(--bg);min-height:100vh;}
.topnav{background:var(--primary);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;}
.nav-left{display:flex;align-items:center;gap:12px;}
.back-btn{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:white;padding:6px 12px;border-radius:8px;font-family:'Sora',sans-serif;font-size:12px;cursor:pointer;text-decoration:none;}
.nav-title{font-size:16px;font-weight:700;color:white;}
.nav-logout{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.7);padding:6px 12px;border-radius:8px;font-family:'Sora',sans-serif;font-size:12px;cursor:pointer;}
.page-layout{display:flex;min-height:calc(100vh - 60px);}
.main-content{flex:1;padding:24px 20px;}
.right-ads{width:200px;flex-shrink:0;background:#f1f5f9;border-left:1px solid var(--border);padding:16px 12px;display:flex;flex-direction:column;gap:12px;}
.ads-title{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
.ad-box{background:white;border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center;min-height:120px;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.ad-sponsored{font-size:9px;color:var(--muted);text-transform:uppercase;margin-bottom:4px;}
@media(max-width:768px){.right-ads{display:none;}}
.hero{background:linear-gradient(135deg,#1a1a2e,#7c2d12);border-radius:16px;padding:24px;margin-bottom:24px;color:white;text-align:center;}
.hero h1{font-family:'DM Serif Display',serif;font-size:26px;margin-bottom:8px;}
.hero p{font-size:13px;color:rgba(255,255,255,0.7);}
.filters{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:20px;display:flex;gap:12px;flex-wrap:wrap;}
.filter-input{padding:9px 14px;border:1.5px solid var(--border);border-radius:8px;font-family:'Sora',sans-serif;font-size:13px;outline:none;flex:1;min-width:150px;}
.filter-input:focus{border-color:var(--accent);}
.filter-select{padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-family:'Sora',sans-serif;font-size:13px;outline:none;background:white;}
.stats-bar{display:flex;gap:12px;margin-bottom:20px;}
.stat-pill{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:8px 16px;font-size:12px;font-weight:600;color:var(--muted);}
.stat-pill span{color:var(--accent);font-weight:700;}
.institutes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;}
.inst-card{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;transition:all 0.2s;cursor:pointer;}
.inst-card:hover{transform:translateY(-4px);box-shadow:0 12px 32px rgba(0,0,0,0.1);border-color:var(--accent);}
.inst-photo{height:140px;background:linear-gradient(135deg,#7c2d12,#f97316);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:48px;}
.inst-photo img{width:100%;height:100%;object-fit:cover;}
.inst-type-badge{position:absolute;top:10px;right:10px;padding:4px 10px;background:rgba(255,255,255,0.9);border-radius:10px;font-size:10px;font-weight:700;color:#7c2d12;}
.inst-body{padding:14px;}
.inst-name{font-size:15px;font-weight:700;color:var(--text);margin-bottom:4px;}
.inst-location{font-size:12px;color:var(--muted);margin-bottom:10px;}
.courses-wrap{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px;}
.course-chip{padding:3px 10px;background:#fff7ed;border:1px solid #fed7aa;border-radius:8px;font-size:11px;color:#ea580c;font-weight:600;}
.inst-info-row{display:flex;gap:12px;font-size:11px;color:var(--muted);margin-bottom:10px;flex-wrap:wrap;}
.info-item{display:flex;align-items:center;gap:4px;}
.inst-actions{display:flex;gap:8px;padding-top:10px;border-top:1px solid #f1f5f9;}
.btn-call{flex:1;padding:9px;background:#fff7ed;color:#ea580c;border:1px solid #fed7aa;border-radius:8px;font-family:'Sora',sans-serif;font-size:12px;font-weight:600;text-decoration:none;text-align:center;}
.btn-web{flex:1;padding:9px;background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe;border-radius:8px;font-family:'Sora',sans-serif;font-size:12px;font-weight:600;text-decoration:none;text-align:center;}
.btn-details{flex:1;padding:9px;background:var(--accent);color:white;border:none;border-radius:8px;font-family:'Sora',sans-serif;font-size:12px;font-weight:600;cursor:pointer;}
.empty-state{text-align:center;padding:60px 20px;grid-column:1/-1;}
.empty-icon{font-size:64px;margin-bottom:16px;}
.empty-title{font-size:18px;font-weight:700;color:var(--text);margin-bottom:8px;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.show{display:flex;}
.modal{background:var(--card);border-radius:20px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;}
.modal-header{padding:20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-size:18px;font-weight:700;}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--muted);}
.modal-body{padding:20px;}
.modal-photos{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;}
.modal-photo{aspect-ratio:1;border-radius:10px;overflow:hidden;background:#f1f5f9;}
.modal-photo img{width:100%;height:100%;object-fit:cover;}
.section-label{font-size:13px;font-weight:700;color:var(--text);margin:14px 0 8px;}
.detail-val{font-size:13px;color:var(--text);line-height:1.7;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:#1e293b;color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;opacity:0;transition:all 0.3s;z-index:9999;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
</style>
</head>
<body>

<div class="topnav">
  <div class="nav-left">
    <a class="back-btn" href="/student-home.html">← Back</a>
    <div class="nav-title">🏫 Coaching Institutes</div>
  </div>
  <button class="nav-logout" onclick="logout()">Logout</button>
</div>

<div class="page-layout">
  <div class="main-content">

    <div class="hero">
      <h1>Find Your Institute 🏫</h1>
      <p>Discover coaching centres and training institutes near you</p>
    </div>

    <div class="filters">
      <input class="filter-input" id="search-input"
        placeholder="🔍 Search by name or course..."
        oninput="applyFilters()"/>
      <select class="filter-select" id="filter-type"
        onchange="applyFilters()">
        <option value="">All Types</option>
        <option value="COACHING">Coaching Centre</option>
        <option value="TRAINING">Training Institute</option>
        <option value="COLLEGE">College</option>
      </select>
    </div>

    <div class="stats-bar">
      <div class="stat-pill">
        Total: <span id="total-count">0</span>
      </div>
      <div class="stat-pill">
        Courses: <span id="courses-count">0</span>
      </div>
    </div>

    <div class="institutes-grid" id="institutes-grid">
      <div style="text-align:center;padding:40px;color:var(--muted);font-size:13px;grid-column:1/-1;">
        ⏳ Loading institutes...
      </div>
    </div>

  </div>

  <div class="right-ads">
    <div class="ads-title">📢 Sponsored</div>
    <div class="ad-box" id="ad-1">
      <div class="ad-sponsored">Ad</div>
      <div style="font-size:11px;color:#cbd5e1;">Advertisement</div>
    </div>
    <div class="ad-box" id="ad-2">
      <div class="ad-sponsored">Ad</div>
      <div style="font-size:11px;color:#cbd5e1;">Advertisement</div>
    </div>
    <div class="ad-box" id="ad-3">
      <div class="ad-sponsored">Ad</div>
      <div style="font-size:11px;color:#cbd5e1;">Advertisement</div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay"
  onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">
        Institute Details
      </div>
      <button class="modal-close"
        onclick="closeModalDirect()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = window.location.origin;
const token = localStorage.getItem('token');
if (!token) window.location.href = '/login.html';

let allInstitutes = [];
let filtered = [];

window.onload = async function() {
  await loadInstitutes();
  await loadAds();
};

async function loadInstitutes() {
  try {
    const res = await fetch(
      API + '/api/public/institutes');
    const data = await res.json();
    allInstitutes = data.data || [];
    filtered = [...allInstitutes];
    updateStats();
    renderInstitutes(filtered);
  } catch(e) {
    document.getElementById('institutes-grid').innerHTML =
      `<div class="empty-state">
        <div class="empty-icon">⚠️</div>
        <div class="empty-title">Cannot load institutes</div>
      </div>`;
  }
}

function updateStats() {
  document.getElementById('total-count').textContent =
    allInstitutes.length;
  const totalCourses = allInstitutes.reduce((sum, i) => {
    return sum + (i.courses
      ? i.courses.split(',').filter(c=>c).length : 0);
  }, 0);
  document.getElementById('courses-count').textContent =
    totalCourses;
}

function renderInstitutes(institutes) {
  const grid = document.getElementById('institutes-grid');
  if (institutes.length === 0) {
    grid.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🏫</div>
        <div class="empty-title">No institutes found</div>
      </div>`;
    return;
  }

  grid.innerHTML = institutes.map(i => {
    const photos = i.photos
      ? i.photos.split(',').filter(p=>p) : [];
    const courses = i.courses
      ? i.courses.split(',').filter(c=>c) : [];
    const typeLabel = i.instituteType === 'COACHING'
      ? 'Coaching' : i.instituteType === 'TRAINING'
      ? 'Training' : i.instituteType === 'COLLEGE'
      ? 'College' : 'Institute';

    return `
      <div class="inst-card"
        onclick="showDetail(${i.id})">
        <div class="inst-photo">
          ${photos[0]
            ? `<img src="${photos[0]}"
                onerror="this.style.display='none'"/>`
            : '🏫'}
          <span class="inst-type-badge">${typeLabel}</span>
        </div>
        <div class="inst-body">
          <div class="inst-name">
            ${i.instituteName||'Institute'}
          </div>
          <div class="inst-location">
            📍 ${i.city||i.address||'Location not set'}
          </div>
          ${courses.length > 0 ? `
            <div class="courses-wrap">
              ${courses.slice(0,3).map(c=>
                `<span class="course-chip">
                  ${c.trim()}
                </span>`).join('')}
              ${courses.length > 3
                ? `<span class="course-chip">
                    +${courses.length-3}
                  </span>` : ''}
            </div>` : ''}
          <div class="inst-info-row">
            ${i.feeRange
              ? `<span class="info-item">
                  💰 ${i.feeRange}
                </span>` : ''}
            ${i.availableSeats
              ? `<span class="info-item">
                  💺 ${i.availableSeats} seats
                </span>` : ''}
          </div>
          <div class="inst-actions">
            ${i.phone
              ? `<a class="btn-call"
                  href="tel:${i.phone}">📞 Call</a>` : ''}
            ${i.website
              ? `<a class="btn-web"
                  href="${i.website}"
                  target="_blank">🌐 Website</a>` : ''}
            <button class="btn-details">Details</button>
          </div>
        </div>
      </div>`;
  }).join('');
}

function showDetail(id) {
  const i = allInstitutes.find(x => x.id === id);
  if (!i) return;

  const photos = i.photos
    ? i.photos.split(',').filter(p=>p) : [];
  const courses = i.courses
    ? i.courses.split(',').filter(c=>c) : [];
  const facilities = i.facilities
    ? i.facilities.split(',').filter(f=>f) : [];

  document.getElementById('modal-title').textContent =
    i.instituteName || 'Institute';

  document.getElementById('modal-body').innerHTML = `
    ${photos.length > 0 ? `
      <div class="modal-photos">
        ${photos.slice(0,6).map(p=>
          `<div class="modal-photo">
            <img src="${p}"/></div>`).join('')}
      </div>` : ''}

    <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:12px;">
      <div style="font-size:13px;">
        📍 ${i.address||i.city||'-'}
      </div>
      <div style="font-size:13px;">
        📞 ${i.phone||'-'} | ✉️ ${i.email||'-'}
      </div>
      ${i.website
        ? `<div style="font-size:13px;">
            🌐 <a href="${i.website}"
              target="_blank"
              style="color:#6366f1;">
              ${i.website}
            </a>
          </div>` : ''}
    </div>

    ${courses.length > 0 ? `
      <div class="section-label">📚 Courses Offered</div>
      <div class="courses-wrap">
        ${courses.map(c=>
          `<span class="course-chip">${c.trim()}</span>`
        ).join('')}
      </div>` : ''}

    ${i.feeRange ? `
      <div class="section-label">💰 Fee Range</div>
      <div class="detail-val">${i.feeRange}</div>` : ''}

    ${i.batchTimings ? `
      <div class="section-label">⏰ Batch Timings</div>
      <div class="detail-val"
        style="white-space:pre-line;">
        ${i.batchTimings}
      </div>` : ''}

    ${facilities.length > 0 ? `
      <div class="section-label">✨ Facilities</div>
      <div class="courses-wrap">
        ${facilities.map(f=>
          `<span style="padding:3px 10px;
            background:#f8fafc;
            border:1px solid #e2e8f0;
            border-radius:8px;font-size:11px;">
            ${f.trim()}
          </span>`).join('')}
      </div>` : ''}

    ${i.achievements ? `
      <div class="section-label">🏆 Achievements</div>
      <div class="detail-val"
        style="white-space:pre-line;">
        ${i.achievements}
      </div>` : ''}

    ${i.faculty ? `
      <div class="section-label">👨‍🏫 Faculty</div>
      <div class="detail-val"
        style="white-space:pre-line;">
        ${i.faculty}
      </div>` : ''}

    ${i.availableSeats ? `
      <div class="section-label">💺 Available Seats</div>
      <div class="detail-val">
        ${i.availableSeats} seats available
      </div>` : ''}

    <div style="margin-top:16px;display:flex;gap:10px;">
      ${i.phone ? `
        <a href="tel:${i.phone}"
          style="flex:1;padding:11px;
          background:#fff7ed;color:#ea580c;
          border:1px solid #fed7aa;
          border-radius:10px;text-align:center;
          font-weight:700;font-size:13px;
          text-decoration:none;">
          📞 Call Now
        </a>` : ''}
      ${i.googleMapsLink ? `
        <a href="${i.googleMapsLink}" target="_blank"
          style="flex:1;padding:11px;
          background:#eff6ff;color:#1d4ed8;
          border:1px solid #bfdbfe;
          border-radius:10px;text-align:center;
          font-weight:700;font-size:13px;
          text-decoration:none;">
          🗺 Directions
        </a>` : ''}
    </div>`;

  document.getElementById('modal-overlay')
    .classList.add('show');
}

function closeModal(e) {
  if (e.target.id === 'modal-overlay') closeModalDirect();
}
function closeModalDirect() {
  document.getElementById('modal-overlay')
    .classList.remove('show');
}

function applyFilters() {
  const search = document.getElementById('search-input')
    .value.toLowerCase();
  const type = document.getElementById('filter-type')
    .value;

  filtered = allInstitutes.filter(i => {
    const matchSearch = !search ||
      (i.instituteName &&
        i.instituteName.toLowerCase().includes(search)) ||
      (i.courses &&
        i.courses.toLowerCase().includes(search)) ||
      (i.city &&
        i.city.toLowerCase().includes(search));
    const matchType = !type ||
      i.instituteType === type;
    return matchSearch && matchType;
  });

  renderInstitutes(filtered);
}

async function loadAds() {
  try {
    const res = await fetch(
      API + '/api/public/ads?target=STUDENT');
    if (!res.ok) return;
    const data = await res.json();
    if (data.data) {
      data.data.slice(0,3).forEach((ad,i) => {
        const box = document.getElementById('ad-'+(i+1));
        if (box && ad.imageUrl) {
          box.innerHTML = `
            <div class="ad-sponsored">Sponsored</div>
            <a href="${ad.linkUrl||'#'}" target="_blank">
            <img src="${ad.imageUrl}"
              style="width:100%;border-radius:6px;"/></a>`;
        }
      });
    }
  } catch(e) {}
}

function logout() {
  localStorage.clear();
  window.location.href = '/login.html';
}
</script>
</body>
</html>
