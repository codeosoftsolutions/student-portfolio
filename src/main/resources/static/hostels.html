<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Hostels & PG — StudentTap</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--primary:#1a1a2e;--accent:#22c55e;--bg:#f8fafc;--card:#fff;--border:#e2e8f0;--text:#1e293b;--muted:#64748b;}
body{font-family:'Sora',sans-serif;background:var(--bg);min-height:100vh;}

/* NAV */
.topnav{background:var(--primary);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;}
.nav-left{display:flex;align-items:center;gap:12px;}
.back-btn{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:white;padding:6px 12px;border-radius:8px;font-family:'Sora',sans-serif;font-size:12px;cursor:pointer;text-decoration:none;display:flex;align-items:center;gap:6px;}
.nav-title{font-size:16px;font-weight:700;color:white;}
.nav-right{display:flex;align-items:center;gap:8px;}
.nav-logout{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.7);padding:6px 12px;border-radius:8px;font-family:'Sora',sans-serif;font-size:12px;cursor:pointer;}

/* LAYOUT */
.page-layout{display:flex;min-height:calc(100vh - 60px);}
.main-content{flex:1;padding:24px 20px;}
.right-ads{width:200px;flex-shrink:0;background:#f1f5f9;border-left:1px solid var(--border);padding:16px 12px;display:flex;flex-direction:column;gap:12px;}
.ads-title{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
.ad-box{background:white;border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center;min-height:120px;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.ad-sponsored{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;}
@media(max-width:768px){.right-ads{display:none;}}

/* HERO */
.hero{background:linear-gradient(135deg,#1a1a2e,#166534);border-radius:16px;padding:24px;margin-bottom:24px;color:white;text-align:center;}
.hero h1{font-family:'DM Serif Display',serif;font-size:26px;margin-bottom:8px;}
.hero p{font-size:13px;color:rgba(255,255,255,0.7);}

/* FILTERS */
.filters{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:20px;display:flex;gap:12px;flex-wrap:wrap;align-items:center;}
.filter-input{padding:9px 14px;border:1.5px solid var(--border);border-radius:8px;font-family:'Sora',sans-serif;font-size:13px;outline:none;flex:1;min-width:150px;}
.filter-input:focus{border-color:var(--accent);}
.filter-select{padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-family:'Sora',sans-serif;font-size:13px;outline:none;background:white;}
.filter-btn{padding:9px 18px;background:var(--accent);color:white;border:none;border-radius:8px;font-family:'Sora',sans-serif;font-size:13px;font-weight:600;cursor:pointer;}

/* STATS BAR */
.stats-bar{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;}
.stat-pill{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:8px 16px;font-size:12px;font-weight:600;color:var(--muted);}
.stat-pill span{color:var(--accent);font-weight:700;}

/* HOSTEL CARDS GRID */
.hostels-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;}

/* HOSTEL CARD */
.hostel-card{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;transition:all 0.2s;cursor:pointer;}
.hostel-card:hover{transform:translateY(-4px);box-shadow:0 12px 32px rgba(0,0,0,0.1);border-color:var(--accent);}

.hostel-photos{height:160px;background:linear-gradient(135deg,#1a1a2e,#166534);position:relative;overflow:hidden;}
.hostel-photos img{width:100%;height:100%;object-fit:cover;}
.hostel-photos-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:48px;}
.gender-badge{position:absolute;top:10px;right:10px;padding:4px 10px;border-radius:10px;font-size:10px;font-weight:700;}
.gender-boys{background:#eff6ff;color:#1d4ed8;}
.gender-girls{background:#fdf4ff;color:#7c3aed;}
.gender-both{background:#f0fdf4;color:#16a34a;}
.avail-badge{position:absolute;top:10px;left:10px;padding:4px 10px;border-radius:10px;font-size:10px;font-weight:700;}
.avail-yes{background:#f0fdf4;color:#16a34a;}
.avail-no{background:#fef2f2;color:#dc2626;}

.hostel-body{padding:14px;}
.hostel-name{font-size:15px;font-weight:700;color:var(--text);margin-bottom:4px;}
.hostel-location{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:4px;margin-bottom:10px;}

/* PRICES */
.prices-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.price-chip{padding:4px 10px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;font-size:11px;color:#16a34a;font-weight:600;}

/* AMENITIES */
.amenities-row{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px;}
.amenity-tag{padding:3px 8px;background:#f8fafc;border:1px solid var(--border);border-radius:6px;font-size:10px;color:var(--muted);}

/* ACTIONS */
.hostel-actions{display:flex;gap:8px;padding-top:10px;border-top:1px solid #f1f5f9;}
.btn-call{flex:1;padding:9px;background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0;border-radius:8px;font-family:'Sora',sans-serif;font-size:12px;font-weight:600;cursor:pointer;text-decoration:none;text-align:center;}
.btn-maps{flex:1;padding:9px;background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe;border-radius:8px;font-family:'Sora',sans-serif;font-size:12px;font-weight:600;cursor:pointer;text-decoration:none;text-align:center;}
.btn-details{flex:1;padding:9px;background:var(--accent);color:white;border:none;border-radius:8px;font-family:'Sora',sans-serif;font-size:12px;font-weight:600;cursor:pointer;}

/* EMPTY */
.empty-state{text-align:center;padding:60px 20px;}
.empty-icon{font-size:64px;margin-bottom:16px;}
.empty-title{font-size:18px;font-weight:700;color:var(--text);margin-bottom:8px;}
.empty-sub{font-size:13px;color:var(--muted);}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.show{display:flex;}
.modal{background:var(--card);border-radius:20px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;}
.modal-header{padding:20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-size:18px;font-weight:700;color:var(--text);}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--muted);}
.modal-body{padding:20px;}
.modal-photos{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;}
.modal-photo{aspect-ratio:1;border-radius:10px;overflow:hidden;background:#f1f5f9;}
.modal-photo img{width:100%;height:100%;object-fit:cover;}
.detail-row{display:flex;gap:8px;margin-bottom:8px;}
.detail-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;min-width:80px;}
.detail-value{font-size:13px;color:var(--text);}
.section-label{font-size:13px;font-weight:700;color:var(--text);margin:14px 0 8px;}
.rules-text{font-size:12px;color:var(--muted);line-height:1.7;white-space:pre-line;}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:#1e293b;color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;opacity:0;transition:all 0.3s;z-index:9999;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
</style>
</head>
<body>

<!-- NAV -->
<div class="topnav">
  <div class="nav-left">
    <a class="back-btn" href="/student-home.html">← Back</a>
    <div class="nav-title">🏠 Hostels & PG</div>
  </div>
  <div class="nav-right">
    <button class="nav-logout" onclick="logout()">Logout</button>
  </div>
</div>

<div class="page-layout">
  <div class="main-content">

    <!-- HERO -->
    <div class="hero">
      <h1>Find Your Perfect PG 🏠</h1>
      <p>Browse hostels and PG accommodations near your college or workplace</p>
    </div>

    <!-- FILTERS -->
    <div class="filters">
      <input class="filter-input" id="search-input"
        placeholder="🔍 Search by name or area..."
        oninput="applyFilters()"/>
      <select class="filter-select" id="filter-gender"
        onchange="applyFilters()">
        <option value="">All (Boys & Girls)</option>
        <option value="BOYS">Boys Only</option>
        <option value="GIRLS">Girls Only</option>
        <option value="BOTH">Both</option>
      </select>
      <select class="filter-select" id="filter-avail"
        onchange="applyFilters()">
        <option value="">All Hostels</option>
        <option value="available">Available Only</option>
      </select>
    </div>

    <!-- STATS -->
    <div class="stats-bar">
      <div class="stat-pill">
        Total: <span id="total-count">0</span>
      </div>
      <div class="stat-pill">
        Available: <span id="avail-count">0</span>
      </div>
    </div>

    <!-- HOSTELS GRID -->
    <div class="hostels-grid" id="hostels-grid">
      <div style="text-align:center;padding:40px;color:var(--muted);font-size:13px;">
        ⏳ Loading hostels...
      </div>
    </div>

  </div>

  <!-- RIGHT ADS -->
  <div class="right-ads">
    <div class="ads-title">📢 Sponsored</div>
    <div class="ad-box" id="ad-1">
      <div class="ad-sponsored">Ad</div>
      <div style="font-size:11px;color:#cbd5e1;">Advertisement</div>
    </div>
    <div class="ad-box" id="ad-2">
      <div class="ad-sponsored">Ad</div>
      <div style="font-size:11px;color:#cbd5e1;">Advertisement</div>
    </div>
    <div class="ad-box" id="ad-3">
      <div class="ad-sponsored">Ad</div>
      <div style="font-size:11px;color:#cbd5e1;">Advertisement</div>
    </div>
  </div>
</div>

<!-- HOSTEL DETAIL MODAL -->
<div class="modal-overlay" id="modal-overlay"
  onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">
        Hostel Details
      </div>
      <button class="modal-close"
        onclick="closeModalDirect()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = window.location.origin;
const token = localStorage.getItem('token');

if (!token) window.location.href = '/login.html';

let allHostels = [];
let filteredHostels = [];

window.onload = async function() {
  await loadHostels();
  await loadAds();
};

async function loadHostels() {
  try {
    const res = await fetch(
      API + '/api/public/hostels');
    const data = await res.json();
    allHostels = data.data || [];
    filteredHostels = [...allHostels];
    updateStats();
    renderHostels(filteredHostels);
  } catch(e) {
    document.getElementById('hostels-grid').innerHTML =
      `<div class="empty-state">
        <div class="empty-icon">⚠️</div>
        <div class="empty-title">Cannot load hostels</div>
        <div class="empty-sub">Please try again later</div>
      </div>`;
  }
}

function updateStats() {
  document.getElementById('total-count').textContent =
    allHostels.length;
  document.getElementById('avail-count').textContent =
    allHostels.filter(h => h.isAvailable !== false).length;
}

function renderHostels(hostels) {
  const grid = document.getElementById('hostels-grid');

  if (hostels.length === 0) {
    grid.innerHTML = `
      <div class="empty-state" style="grid-column:1/-1">
        <div class="empty-icon">🏠</div>
        <div class="empty-title">No hostels found</div>
        <div class="empty-sub">
          Try adjusting your filters or check back later
        </div>
      </div>`;
    return;
  }

  grid.innerHTML = hostels.map(h => {
    // Photos
    const photos = h.photos
      ? h.photos.split(',').filter(p => p) : [];
    const firstPhoto = photos[0];

    // Gender badge
    const genderClass = h.genderType === 'BOYS'
      ? 'gender-boys' : h.genderType === 'GIRLS'
      ? 'gender-girls' : 'gender-both';
    const genderText = h.genderType === 'BOYS'
      ? '👦 Boys' : h.genderType === 'GIRLS'
      ? '👧 Girls' : '👥 Both';

    // Availability
    const available = h.isAvailable !== false;

    // Prices
    const prices = [];
    if (h.singleRoomPrice)
      prices.push('Single: ₹'+h.singleRoomPrice);
    if (h.doubleSharePrice)
      prices.push('Double: ₹'+h.doubleSharePrice);
    if (h.tripleSharePrice)
      prices.push('Triple: ₹'+h.tripleSharePrice);

    // Amenities (show max 4)
    const amenities = h.amenities
      ? h.amenities.split(',').slice(0,4) : [];

    return `
      <div class="hostel-card"
        onclick="showHostelDetail(${h.id})">
        <div class="hostel-photos">
          ${firstPhoto
            ? `<img src="${firstPhoto}"
                alt="${h.hostelName}"
                onerror="this.style.display='none'"/>`
            : `<div class="hostel-photos-placeholder">🏠</div>`}
          <span class="gender-badge ${genderClass}">
            ${genderText}
          </span>
          <span class="avail-badge ${available
            ? 'avail-yes':'avail-no'}">
            ${available ? '✅ Available' : '🔴 Full'}
          </span>
        </div>
        <div class="hostel-body">
          <div class="hostel-name">
            ${h.hostelName || 'Hostel'}
          </div>
          <div class="hostel-location">
            📍 ${h.address || h.city || 'Location not set'}
          </div>
          ${prices.length > 0 ? `
            <div class="prices-row">
              ${prices.map(p =>
                `<span class="price-chip">${p}/mo</span>`
              ).join('')}
            </div>` : ''}
          ${amenities.length > 0 ? `
            <div class="amenities-row">
              ${amenities.map(a =>
                `<span class="amenity-tag">${a.trim()}</span>`
              ).join('')}
              ${h.amenities.split(',').length > 4
                ? `<span class="amenity-tag">+${h.amenities.split(',').length-4} more</span>`
                : ''}
            </div>` : ''}
          <div class="hostel-actions">
            ${h.phone ? `
              <a class="btn-call" href="tel:${h.phone}">
                📞 Call
              </a>` : ''}
            ${h.googleMapsLink ? `
              <a class="btn-maps"
                href="${h.googleMapsLink}"
                target="_blank">
                🗺 Maps
              </a>` : ''}
            <button class="btn-details">
              View Details
            </button>
          </div>
        </div>
      </div>`;
  }).join('');
}

function showHostelDetail(id) {
  const h = allHostels.find(h => h.id === id);
  if (!h) return;

  const photos = h.photos
    ? h.photos.split(',').filter(p => p) : [];
  const amenities = h.amenities
    ? h.amenities.split(',').filter(a => a) : [];

  document.getElementById('modal-title').textContent =
    h.hostelName || 'Hostel Details';

  document.getElementById('modal-body').innerHTML = `
    ${photos.length > 0 ? `
      <div class="modal-photos">
        ${photos.slice(0,6).map(p =>
          `<div class="modal-photo">
            <img src="${p}" alt="photo"/>
          </div>`).join('')}
      </div>` : ''}

    <div class="detail-row">
      <span class="detail-label">Location</span>
      <span class="detail-value">
        📍 ${h.address || '-'}
      </span>
    </div>
    <div class="detail-row">
      <span class="detail-label">City</span>
      <span class="detail-value">${h.city || '-'}</span>
    </div>
    <div class="detail-row">
      <span class="detail-label">For</span>
      <span class="detail-value">
        ${h.genderType === 'BOYS' ? '👦 Boys Only'
          : h.genderType === 'GIRLS' ? '👧 Girls Only'
          : '👥 Boys & Girls Both'}
      </span>
    </div>
    <div class="detail-row">
      <span class="detail-label">Contact</span>
      <span class="detail-value">
        📞 ${h.phone || '-'} |
        ✉️ ${h.email || '-'}
      </span>
    </div>
    <div class="detail-row">
      <span class="detail-label">Status</span>
      <span class="detail-value">
        ${h.isAvailable !== false
          ? '✅ Available'
          : '🔴 Full - Not accepting'}
      </span>
    </div>
    ${h.totalRooms ? `
      <div class="detail-row">
        <span class="detail-label">Rooms</span>
        <span class="detail-value">
          Total: ${h.totalRooms} |
          Available: ${h.availableRooms || 0}
        </span>
      </div>` : ''}

    <div class="section-label">💰 Room Prices</div>
    <div class="prices-row">
      ${h.singleRoomPrice
        ? `<span class="price-chip">
            Single: ₹${h.singleRoomPrice}/mo
          </span>` : ''}
      ${h.doubleSharePrice
        ? `<span class="price-chip">
            Double: ₹${h.doubleSharePrice}/mo
          </span>` : ''}
      ${h.tripleSharePrice
        ? `<span class="price-chip">
            Triple: ₹${h.tripleSharePrice}/mo
          </span>` : ''}
      ${h.fourSharePrice
        ? `<span class="price-chip">
            4-Share: ₹${h.fourSharePrice}/mo
          </span>` : ''}
    </div>

    ${amenities.length > 0 ? `
      <div class="section-label">✨ Amenities</div>
      <div class="amenities-row">
        ${amenities.map(a =>
          `<span class="amenity-tag">${a.trim()}</span>`
        ).join('')}
      </div>` : ''}

    ${h.timings ? `
      <div class="section-label">⏰ Timings</div>
      <div class="detail-value">${h.timings}</div>` : ''}

    ${h.rules ? `
      <div class="section-label">📋 Rules</div>
      <div class="rules-text">${h.rules}</div>` : ''}

    ${h.description ? `
      <div class="section-label">📝 About</div>
      <div class="rules-text">${h.description}</div>` : ''}

    <div style="margin-top:16px;display:flex;gap:10px;">
      ${h.phone ? `
        <a href="tel:${h.phone}"
          style="flex:1;padding:11px;background:#f0fdf4;
          color:#16a34a;border:1px solid #bbf7d0;
          border-radius:10px;text-align:center;
          font-weight:700;font-size:13px;
          text-decoration:none;">
          📞 Call Now
        </a>` : ''}
      ${h.googleMapsLink ? `
        <a href="${h.googleMapsLink}" target="_blank"
          style="flex:1;padding:11px;background:#eff6ff;
          color:#1d4ed8;border:1px solid #bfdbfe;
          border-radius:10px;text-align:center;
          font-weight:700;font-size:13px;
          text-decoration:none;">
          🗺 Get Directions
        </a>` : ''}
    </div>`;

  document.getElementById('modal-overlay')
    .classList.add('show');
}

function closeModal(e) {
  if (e.target.id === 'modal-overlay') closeModalDirect();
}
function closeModalDirect() {
  document.getElementById('modal-overlay')
    .classList.remove('show');
}

function applyFilters() {
  const search = document.getElementById('search-input')
    .value.toLowerCase();
  const gender = document.getElementById('filter-gender')
    .value;
  const avail = document.getElementById('filter-avail')
    .value;

  filteredHostels = allHostels.filter(h => {
    const matchSearch = !search ||
      (h.hostelName &&
        h.hostelName.toLowerCase().includes(search)) ||
      (h.address &&
        h.address.toLowerCase().includes(search)) ||
      (h.city &&
        h.city.toLowerCase().includes(search));

    const matchGender = !gender ||
      h.genderType === gender;

    const matchAvail = !avail ||
      (avail === 'available' &&
        h.isAvailable !== false);

    return matchSearch && matchGender && matchAvail;
  });

  renderHostels(filteredHostels);
}

async function loadAds() {
  try {
    const res = await fetch(
      API + '/api/public/ads?target=STUDENT');
    if (!res.ok) return;
    const data = await res.json();
    if (data.data) {
      data.data.slice(0,3).forEach((ad,i) => {
        const box = document.getElementById('ad-'+(i+1));
        if (box && ad.imageUrl) {
          box.innerHTML = `
            <div class="ad-sponsored">Sponsored</div>
            <a href="${ad.linkUrl||'#'}" target="_blank">
            <img src="${ad.imageUrl}"
              style="width:100%;border-radius:6px;"/></a>`;
        }
      });
    }
  } catch(e) {}
}

function logout() {
  localStorage.clear();
  window.location.href = '/login.html';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
</body>
</html>
