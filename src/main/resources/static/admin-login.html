<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Login — StudentTap</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Sora',sans-serif;background:#0f172a;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.card{background:#1e293b;border:1px solid #334155;border-radius:20px;padding:40px 36px;width:100%;max-width:380px;}
.logo{text-align:center;margin-bottom:28px;}
.logo-icon{width:56px;height:56px;background:linear-gradient(135deg,#6366f1,#818cf8);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 12px;}
.logo-text{font-size:20px;font-weight:700;color:white;}
.logo-sub{font-size:12px;color:#64748b;margin-top:4px;}
.form-group{margin-bottom:16px;}
.form-label{font-size:12px;font-weight:600;color:#94a3b8;margin-bottom:6px;display:block;}
.form-input{width:100%;padding:11px 14px;background:#0f172a;border:1.5px solid #334155;border-radius:10px;font-family:'Sora',sans-serif;font-size:13px;color:white;outline:none;transition:border-color 0.2s;}
.form-input:focus{border-color:#6366f1;}
.form-input::placeholder{color:#475569;}
.btn{width:100%;padding:13px;background:linear-gradient(135deg,#6366f1,#818cf8);color:white;border:none;border-radius:10px;font-family:'Sora',sans-serif;font-size:14px;font-weight:700;cursor:pointer;}
.btn:hover{opacity:0.9;}
.btn:disabled{opacity:0.5;cursor:not-allowed;}
.error-msg{background:rgba(220,38,38,0.1);border:1px solid rgba(220,38,38,0.3);color:#fca5a5;padding:10px;border-radius:8px;font-size:12px;margin-bottom:12px;display:none;}
.back-link{text-align:center;margin-top:16px;}
.back-link a{font-size:12px;color:#475569;text-decoration:none;}
.back-link a:hover{color:#94a3b8;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">⚙️</div>
    <div class="logo-text">Admin Panel</div>
    <div class="logo-sub">StudentTap Administration</div>
  </div>

  <div class="error-msg" id="error-msg"></div>

  <div class="form-group">
    <label class="form-label">Admin Email</label>
    <input class="form-input" id="email" type="email"
      placeholder="admin@codeosoftsolutions.com"/>
  </div>
  <div class="form-group">
    <label class="form-label">Password</label>
    <input class="form-input" id="password"
      type="password" placeholder="Admin password"/>
  </div>

  <button class="btn" id="login-btn" onclick="doLogin()">
    🔐 Login to Admin Panel
  </button>

  <div class="back-link">
    <a href="/login.html">← Back to main login</a>
  </div>
</div>

<script>
const API = window.location.origin;

async function doLogin() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  if (!email || !password) {
    showError('Please enter email and password!');
    return;
  }

  const btn = document.getElementById('login-btn');
  btn.disabled = true;
  btn.textContent = '⏳ Logging in...';

  try {
    const res = await fetch(API + '/api/admin/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({email, password})
    });
    const data = await res.json();

    if (res.ok && data.token) {
      localStorage.setItem('adminToken', data.token);
      localStorage.setItem('adminUser',
        JSON.stringify(data.admin));
      window.location.href = '/admin-panel.html';
    } else {
      showError(data.message || 'Invalid credentials!');
    }
  } catch(e) {
    showError('Cannot connect to server!');
  } finally {
    btn.disabled = false;
    btn.textContent = '🔐 Login to Admin Panel';
  }
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.style.display = 'block';
}

document.addEventListener('keypress', e => {
  if (e.key === 'Enter') doLogin();
});
</script>
</body>
</html>
