<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Forgot Password — StudentTap</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Sora',sans-serif;background:linear-gradient(135deg,#1a1a2e,#312e81);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.card{background:white;border-radius:20px;padding:40px 36px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,0.3);}
.logo{text-align:center;margin-bottom:28px;}
.logo-icon{width:60px;height:60px;background:linear-gradient(135deg,#6366f1,#818cf8);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 12px;}
.logo-text{font-size:22px;font-weight:700;color:#1e293b;}
.logo-sub{font-size:13px;color:#64748b;margin-top:4px;}

/* Steps */
.step{display:none;}
.step.active{display:block;}
.step-title{font-size:20px;font-weight:700;color:#1e293b;margin-bottom:6px;}
.step-sub{font-size:13px;color:#64748b;margin-bottom:24px;line-height:1.6;}

.form-group{margin-bottom:16px;}
.form-label{font-size:12px;font-weight:600;color:#374151;margin-bottom:6px;display:block;}
.form-input{width:100%;padding:12px 14px;border:1.5px solid #e2e8f0;border-radius:10px;font-family:'Sora',sans-serif;font-size:14px;color:#1e293b;outline:none;transition:border-color 0.2s;}
.form-input:focus{border-color:#6366f1;background:#fafafa;}

/* OTP Input */
.otp-wrap{display:flex;gap:8px;justify-content:center;margin:16px 0;}
.otp-input{width:48px;height:56px;border:2px solid #e2e8f0;border-radius:10px;font-size:22px;font-weight:700;text-align:center;color:#1e293b;font-family:'Sora',sans-serif;outline:none;transition:border-color 0.2s;}
.otp-input:focus{border-color:#6366f1;}

.btn{width:100%;padding:13px;background:linear-gradient(135deg,#6366f1,#818cf8);color:white;border:none;border-radius:10px;font-family:'Sora',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all 0.2s;margin-top:8px;}
.btn:hover{opacity:0.9;transform:translateY(-1px);}
.btn:disabled{opacity:0.6;cursor:not-allowed;transform:none;}

.error-msg{background:#fef2f2;border:1px solid #fecaca;color:#dc2626;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:12px;display:none;}
.success-msg{background:#f0fdf4;border:1px solid #86efac;color:#16a34a;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:12px;display:none;}

.back-link{text-align:center;margin-top:20px;font-size:13px;color:#64748b;}
.back-link a{color:#6366f1;font-weight:600;text-decoration:none;}

.email-display{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:10px 14px;font-size:13px;color:#374151;margin-bottom:16px;text-align:center;font-weight:600;}

.resend-btn{background:none;border:none;color:#6366f1;font-family:'Sora',sans-serif;font-size:13px;font-weight:600;cursor:pointer;text-decoration:underline;margin-top:12px;display:block;text-align:center;width:100%;}

.progress{display:flex;justify-content:center;gap:8px;margin-bottom:28px;}
.progress-dot{width:10px;height:10px;border-radius:50%;background:#e2e8f0;transition:background 0.3s;}
.progress-dot.active{background:#6366f1;}
.progress-dot.done{background:#22c55e;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">🎓</div>
    <div class="logo-text">StudentTap</div>
    <div class="logo-sub">Reset your password</div>
  </div>

  <!-- Progress dots -->
  <div class="progress">
    <div class="progress-dot active" id="dot1"></div>
    <div class="progress-dot" id="dot2"></div>
    <div class="progress-dot" id="dot3"></div>
  </div>

  <!-- STEP 1: Enter Email -->
  <div class="step active" id="step1">
    <div class="step-title">Forgot Password? 🔑</div>
    <div class="step-sub">Enter your registered email address. We will send you a 6-digit OTP.</div>
    <div class="error-msg" id="err1"></div>
    <div class="success-msg" id="suc1"></div>
    <div class="form-group">
      <label class="form-label">Email Address</label>
      <input class="form-input" type="email"
        id="email-input"
        placeholder="your@email.com"/>
    </div>
    <button class="btn" id="send-otp-btn"
      onclick="sendOtp()">
      📧 Send OTP
    </button>
    <div class="back-link">
      Remember password?
      <a href="/login.html">Login here</a>
    </div>
  </div>

  <!-- STEP 2: Enter OTP -->
  <div class="step" id="step2">
    <div class="step-title">Enter OTP 🔐</div>
    <div class="step-sub">Enter the 6-digit OTP sent to your email.</div>
    <div class="email-display" id="email-display"></div>
    <div class="error-msg" id="err2"></div>
    <div class="otp-wrap">
      <input class="otp-input" id="otp1" maxlength="1" oninput="otpMove(this,'otp2')"/>
      <input class="otp-input" id="otp2" maxlength="1" oninput="otpMove(this,'otp3')" onkeydown="otpBack(event,'otp1')"/>
      <input class="otp-input" id="otp3" maxlength="1" oninput="otpMove(this,'otp4')" onkeydown="otpBack(event,'otp2')"/>
      <input class="otp-input" id="otp4" maxlength="1" oninput="otpMove(this,'otp5')" onkeydown="otpBack(event,'otp3')"/>
      <input class="otp-input" id="otp5" maxlength="1" oninput="otpMove(this,'otp6')" onkeydown="otpBack(event,'otp4')"/>
      <input class="otp-input" id="otp6" maxlength="1" onkeydown="otpBack(event,'otp5')"/>
    </div>
    <button class="btn" onclick="verifyOtp()">
      ✅ Verify OTP
    </button>
    <button class="resend-btn" onclick="resendOtp()">
      Didn't receive? Resend OTP
    </button>
  </div>

  <!-- STEP 3: New Password -->
  <div class="step" id="step3">
    <div class="step-title">New Password 🔒</div>
    <div class="step-sub">Enter your new password. Must be at least 6 characters.</div>
    <div class="error-msg" id="err3"></div>
    <div class="success-msg" id="suc3"></div>
    <div class="form-group">
      <label class="form-label">New Password</label>
      <input class="form-input" type="password"
        id="new-password"
        placeholder="Enter new password"/>
    </div>
    <div class="form-group">
      <label class="form-label">Confirm Password</label>
      <input class="form-input" type="password"
        id="confirm-password"
        placeholder="Confirm new password"/>
    </div>
    <button class="btn" onclick="resetPassword()">
      🔐 Reset Password
    </button>
  </div>

</div>

<script>
const API = window.location.origin;
let userEmail = '';

async function sendOtp() {
  const email = document.getElementById('email-input')
    .value.trim();
  if (!email) {
    showError('err1', 'Please enter your email!');
    return;
  }

  const btn = document.getElementById('send-otp-btn');
  btn.disabled = true;
  btn.textContent = '⏳ Sending...';

  try {
    const res = await fetch(API + '/api/auth/forgot-password', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({email})
    });
    const data = await res.json();

    if (data.success) {
      userEmail = email;
      document.getElementById('email-display')
        .textContent = '📧 OTP sent to: ' + email;
      showStep(2);
      document.getElementById('otp1').focus();
    } else {
      showError('err1', data.message);
    }
  } catch(e) {
    showError('err1', 'Cannot connect to server!');
  }

  btn.disabled = false;
  btn.textContent = '📧 Send OTP';
}

async function verifyOtp() {
  const otp = ['otp1','otp2','otp3','otp4','otp5','otp6']
    .map(id => document.getElementById(id).value)
    .join('');

  if (otp.length !== 6) {
    showError('err2', 'Please enter all 6 digits!');
    return;
  }

  try {
    const res = await fetch(API + '/api/auth/verify-otp', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({email: userEmail, otp})
    });
    const data = await res.json();

    if (data.success) {
      showStep(3);
    } else {
      showError('err2', data.message);
      // Clear OTP inputs
      ['otp1','otp2','otp3','otp4','otp5','otp6']
        .forEach(id => document.getElementById(id).value = '');
      document.getElementById('otp1').focus();
    }
  } catch(e) {
    showError('err2', 'Cannot connect to server!');
  }
}

async function resetPassword() {
  const password = document.getElementById('new-password')
    .value;
  const confirmPassword = document.getElementById(
    'confirm-password').value;

  if (!password || !confirmPassword) {
    showError('err3', 'Please fill both fields!');
    return;
  }
  if (password !== confirmPassword) {
    showError('err3', 'Passwords do not match!');
    return;
  }
  if (password.length < 6) {
    showError('err3',
      'Password must be at least 6 characters!');
    return;
  }

  try {
    const res = await fetch(
      API + '/api/auth/reset-password', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        email: userEmail,
        password,
        confirmPassword
      })
    });
    const data = await res.json();

    if (data.success) {
      document.getElementById('err3').style.display = 'none';
      document.getElementById('suc3').textContent =
        '✅ Password reset! Redirecting to login...';
      document.getElementById('suc3').style.display = 'block';
      // Update progress dots
      document.getElementById('dot3').classList.add('done');
      setTimeout(() => {
        window.location.href = '/login.html';
      }, 2000);
    } else {
      showError('err3', data.message);
    }
  } catch(e) {
    showError('err3', 'Cannot connect to server!');
  }
}

async function resendOtp() {
  ['otp1','otp2','otp3','otp4','otp5','otp6']
    .forEach(id => document.getElementById(id).value = '');
  await sendOtp();
}

function showStep(num) {
  document.querySelectorAll('.step')
    .forEach(s => s.classList.remove('active'));
  document.getElementById('step' + num)
    .classList.add('active');

  // Update progress dots
  for (let i = 1; i <= 3; i++) {
    const dot = document.getElementById('dot' + i);
    dot.classList.remove('active', 'done');
    if (i < num) dot.classList.add('done');
    if (i === num) dot.classList.add('active');
  }
}

function showError(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 4000);
}

function otpMove(current, nextId) {
  if (current.value.length === 1) {
    const next = document.getElementById(nextId);
    if (next) next.focus();
  }
}

function otpBack(event, prevId) {
  if (event.key === 'Backspace' &&
      event.target.value === '') {
    const prev = document.getElementById(prevId);
    if (prev) prev.focus();
  }
}
</script>
</body>
</html>
